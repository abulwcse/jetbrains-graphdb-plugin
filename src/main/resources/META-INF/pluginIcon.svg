<!-- GraphDB Plugin — Marketplace listing icon, 40x40 px -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="40" height="40"
     viewBox="0 0 40 40">

  <!-- Edge: top-left node to centre node -->
  <line x1="9" y1="9" x2="20" y2="20"
        stroke="#4A90D9" stroke-width="3"
        stroke-linecap="round"/>

  <!-- Edge: top-right node to centre node -->
  <line x1="31" y1="9" x2="20" y2="20"
        stroke="#4A90D9" stroke-width="3"
        stroke-linecap="round"/>

  <!-- Edge: bottom node to centre node -->
  <line x1="20" y1="31" x2="20" y2="20"
        stroke="#4A90D9" stroke-width="3"
        stroke-linecap="round"/>

  <!-- Edge: top-left to top-right (horizontal) -->
  <line x1="9" y1="9" x2="31" y2="9"
        stroke="#4A90D9" stroke-width="2.5"
        stroke-linecap="round"
        opacity="0.6"/>

  <!-- Centre node (hub) -->
  <circle cx="20" cy="20" r="6"
          fill="#4A90D9"/>

  <!-- Top-left node -->
  <circle cx="9" cy="9" r="4.5"
          fill="#7AB8F5"/>

  <!-- Top-right node -->
  <circle cx="31" cy="9" r="4.5"
          fill="#7AB8F5"/>

  <!-- Bottom node -->
  <circle cx="20" cy="31" r="4.5"
          fill="#7AB8F5"/>

</svg>