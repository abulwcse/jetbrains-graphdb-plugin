# =============================================================================
# GraphDB Plugin — UI message bundle
#
# All user-facing strings used in the plugin are centralised here so that
# they can be updated without touching Kotlin source files and to facilitate
# future localisation.
#
# Keys follow the convention:
#   <area>.<component>.<description>
# =============================================================================

# -----------------------------------------------------------------------------
# Tool window
# -----------------------------------------------------------------------------
toolwindow.title=GraphDB
toolwindow.empty.text=No data sources configured.\nClick \u2795 to add one.

# -----------------------------------------------------------------------------
# Notification group (must match the id declared in plugin.xml)
# -----------------------------------------------------------------------------
notification.group.graphdb=GraphDB Notifications

# -----------------------------------------------------------------------------
# AddEditDataSourceDialog — window titles
# -----------------------------------------------------------------------------
dialog.addDataSource.title=Add Data Source
dialog.editDataSource.title=Edit Data Source

# -----------------------------------------------------------------------------
# AddEditDataSourceDialog — field labels
# -----------------------------------------------------------------------------
dialog.field.name=Name:
dialog.field.url=URL:
dialog.field.username=Username:
dialog.field.password=Password:
dialog.field.database=Database:
dialog.field.ssl=Enable SSL/TLS
dialog.field.timeout=Connection Timeout (seconds):
dialog.field.color=Color:

# -----------------------------------------------------------------------------
# AddEditDataSourceDialog — placeholder / hint text
# -----------------------------------------------------------------------------
dialog.placeholder.url=bolt://localhost:7687
dialog.placeholder.username=neo4j
dialog.placeholder.database=neo4j
dialog.placeholder.timeout=30

# -----------------------------------------------------------------------------
# AddEditDataSourceDialog — buttons
# -----------------------------------------------------------------------------
dialog.button.testConnection=Test Connection
dialog.button.ok=OK
dialog.button.cancel=Cancel

# -----------------------------------------------------------------------------
# AddEditDataSourceDialog — validation errors
# -----------------------------------------------------------------------------
dialog.validation.nameRequired=Name is required.
dialog.validation.urlRequired=URL is required.
dialog.validation.urlInvalid=URL must start with bolt:// or neo4j://.
dialog.validation.usernameRequired=Username is required.
dialog.validation.timeoutInvalid=Connection timeout must be a positive integer.

# -----------------------------------------------------------------------------
# AddEditDataSourceDialog — test connection feedback
# -----------------------------------------------------------------------------
dialog.testConnection.success=\u2713 Connected successfully.
dialog.testConnection.failure=\u2717 Connection failed: {0}
dialog.testConnection.connecting=Connecting\u2026

# -----------------------------------------------------------------------------
# Delete confirmation dialog
# -----------------------------------------------------------------------------
dialog.deleteDataSource.title=Delete Data Source
dialog.deleteDataSource.message=Are you sure you want to delete \u2018{0}\u2019?\nThis action cannot be undone.
dialog.deleteDataSource.confirmButton=Delete

# -----------------------------------------------------------------------------
# Action texts (shown in toolbar tooltips and menus)
# -----------------------------------------------------------------------------
action.addDataSource.text=Add Data Source
action.addDataSource.description=Add a new Neo4j/Bolt data source
action.editDataSource.text=Edit Data Source
action.editDataSource.description=Edit the selected Neo4j/Bolt data source
action.deleteDataSource.text=Delete Data Source
action.deleteDataSource.description=Delete the selected Neo4j/Bolt data source

# -----------------------------------------------------------------------------
# Notifications sent to the IDE balloon notification system
# -----------------------------------------------------------------------------
notification.dataSource.added.title=Data Source Added
notification.dataSource.added.content=\u2018{0}\u2019 has been added.
notification.dataSource.updated.title=Data Source Updated
notification.dataSource.updated.content=\u2018{0}\u2019 has been updated.
notification.dataSource.deleted.title=Data Source Deleted
notification.dataSource.deleted.content=\u2018{0}\u2019 has been removed.
notification.editorComingSoon.title=Editor Coming in Phase 3
notification.editorComingSoon.content=The Cypher query editor for \u2018{0}\u2019 will be available in Phase 3.

# -----------------------------------------------------------------------------
# Error messages
# -----------------------------------------------------------------------------
error.generic.title=GraphDB Plugin Error
error.connection.title=Connection Error
error.connection.cannotConnect=Cannot connect to {0}: {1}
error.dataSource.notFound=Data source with id \u2018{0}\u2019 was not found.
error.password.save=Failed to save password for \u2018{0}\u2019: {1}
error.password.load=Failed to load password for \u2018{0}\u2019: {1}

# -----------------------------------------------------------------------------
# Color picker — accessibility labels
# -----------------------------------------------------------------------------
colorPicker.label=Select a colour for this data source:
colorPicker.color.blue=#4A90D9
colorPicker.color.green=#27AE60
colorPicker.color.red=#E74C3C
colorPicker.color.orange=#E67E22
colorPicker.color.purple=#8E44AD
colorPicker.color.teal=#16A085
colorPicker.color.yellow=#F39C12
colorPicker.color.pink=#E91E8C
